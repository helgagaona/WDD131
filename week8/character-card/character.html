<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="character.css">
    <script src="character.js" defer></script>
    <meta name="description" content="
      Explore and interact with your character! View stats, abilities, and equipment, 
      then use buttons to simulate attacks or level up in this interactive character card.">

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Interactive Character Sheet">
    <meta property="og:description" 
      content="Explore and interact with your character! View stats, abilities, and equipment, 
      then use buttons to simulate attacks or level up in this interactive character card.">
    <meta property="og:url" content="https://helgagaona.github.io/WDD131/week8/character-card/character.html">
    <meta property="og:image" content="https://i.pinimg.com/736x/ab/4d/a6/ab4da65842f8fad8c762c4e10d8521a1.jpg">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Interactive Character Sheet">
    <meta name="twitter:description"
      content="Explore and interact with your character! View stats, abilities, and equipment, 
      then use buttons to simulate attacks or level up in this interactive character card.">
    <meta name="twitter:image" content="https://i.pinimg.com/736x/ab/4d/a6/ab4da65842f8fad8c762c4e10d8521a1.jpg">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="images/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">

</head>
<body>
    <div class="card">
    <img src="images/character.jpg" alt="Profile Image" class="image">

    <div class="name"></div>

    <div class="stats">
      <p><i id="charDialog"></i></p>

      <p><strong>Type:</strong> <span id="charType"></span></p>
      <p><strong>Element:</strong> <span id="charElement"></span></p>
      <p><strong>Alignment:</strong> <span id="charAlignment"></span></p>
      <p><strong>Weapon:</strong> <span id="charWeapon"></span></p>
      <p><strong>Technique:</strong> <span id="charTechnique"></span></p>
      <p><strong>Level:</strong> <span id="charLevel"></span></p>
      <p><strong>Health:</strong> <span id="charHealth"></span></p>
    </div>

    <div class="buttons">
      <button id="attackedBtn">Attacked</button>
      <button id="levelBtn">Level Up</button>
    </div>
  </div>
</body>
</html>
