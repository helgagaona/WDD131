<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="character.css">
    <script src="character.js" defer></script>
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Put Page Title Here">
    <meta property="og:description" content="Put Page Description Here">
    <meta property="og:url" content="https://yourURLofPage.here">
    <meta property="og:image" content="https://yourURLofSocialPreviewImageHere.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Put Page Title Here">
    <meta name="twitter:description" content="Put Page Description Here">
    <meta name="twitter:image" content="https://yourURLofSocialPreviewImageHere.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">

</head>
<body>
    <div class="card">
    <img src="images/character.jpg" alt="Profile Image" class="image">

    <div class="name"></div>

    <div class="stats">
      <p><i id="charDialog"></i></p>

      <p><strong>Type:</strong> <span id="charType"></span></p>
      <p><strong>Element:</strong> <span id="charElement"></span></p>
      <p><strong>Alignment:</strong> <span id="charAlignment"></span></p>
      <p><strong>Weapon:</strong> <span id="charWeapon"></span></p>
      <p><strong>Technique:</strong> <span id="charTechnique"></span></p>
      <p><strong>Level:</strong> <span id="charLevel"></span></p>
      <p><strong>Health:</strong> <span id="charHealth"></span></p>
    </div>

    <div class="buttons">
      <button id="attackedBtn">Attacked</button>
      <button id="levelBtn">Level Up</button>
    </div>
  </div>
</body>
</html>
