<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> 
    <meta name="description" content="A collection of delicious recipes.">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/favicon.ico">
    
    <!-- Social Media Meta Tags -->
    <meta property="og:title" content="RecipeBook | Helga Gaona">
    <meta property="og:type" content="website">
    <meta property="og:description" content="A collection of delicious recipes.">
    <meta property="og:image" content="images/apple-crisp.jpg">
    <meta property="og:url" content="https://helgagaona.github.io/WDD131/">
    <meta name="twitter:card" content="summary_large_image">

    <title>RecipeBook | Helga Gaona</title>
    <link rel="stylesheet" href="recipes.css">
</head>
<body>
    <header>
        <img class="logo" src="images/recipe-book.png" alt="Recipe Book Logo">
        <h1 class="title">RecipeBook</h1>
    </header>
    
    <div class="search-container">
        <form>
            <input type="text" id="search-input" placeholder="Find a Recipe" required>
            <button type="submit" id="search-button" aria-label="Search">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="40" height="40">
                    <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
            </button>
        </form>
    </div>

    <div class="divider"></div>
    <main>
        <section class="recipes">
            <article class="recipe">
            <img src="images/apple-crisp.jpg" alt="Image of Apple Crisp" />
            <div class="recipe-info">
                <div class="recipe__tags"><p class="tag">desert</p></div>
                <h2 class="recipe-title">Apple Crisp</h2>
                
                <span
                class="rating"
                role="img"
                aria-label="Rating: 4 out of 5 stars"
                >
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star-empty">☆</span>
                </span>
                    
                <p class="description">
                    This apple crisp recipe is a simple yet delicious fall dessert that's great served warm with vanilla ice cream.</p>
            </div>
        </article>
        </section>
    </main>
    <footer>
        <div class="social">
            <a href="#" aria-label="Instagram">
                <img src="images/instagram_icon.svg" alt="Instagram">
            </a>
            <a href="#" aria-label="YouTube">
                <img src="images/youtube_icon.svg" alt="YouTube">
            </a>
            <a href="#" aria-label="Pinterest">
                <img src="images/pinterest_icon.svg" alt="Pinterest">
            </a>
        </div>
        <p>
            <a href="https://www.flaticon.com/free-icons/recipe" title="Recipe icons">
                Recipe icons created by Freepik - Flaticon
            </a>
        </p>
    </footer>
